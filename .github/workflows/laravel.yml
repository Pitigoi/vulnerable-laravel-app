name: Laravel
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  laravel-tests:
    permissions:
      security-events: write # for uploading code scanning alert info
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    runs-on: ubuntu-latest
    steps:

    - uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1
      with:
        php-version: '7.4.33'
        tools: composer:2.9.2, phpunit

    - uses: actions/checkout@v4

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Composer Update
      run: composer update --dev --no-security-blocking

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/php@master
      continue-on-error: true # To make sure that SARIF upload gets called
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --sarif-file-output=snyk.sarif

    - name: Upload result to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: snyk.sarif

    - name: Clean snyk sarif
      run: rm snyk.sarif

    - name: Run PHP CodeSniffer
      run: php artisan code:sniffer

    - name: Upload CodeSniffer SARIF
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: phpcs-report.sarif

    # - name: Execute tests (Unit and Feature tests) via PHPUnit/Pest
    #   env:
    #     DB_CONNECTION: sqlite
    #     DB_DATABASE: database/database.sqlite
    #   run: phpunit

    - name: npm i 
      env:
        NODE_OPTIONS: --openssl-legacy-provider
      run: npm i ; npm run dev

    - name: start the server
      run: |
        php artisan serve --port=3001 & # Start in background

    #- name: ZAP Scan
    #  uses: zaproxy/action-full-scan@v0.13.0
    #  with:
    #    allow_issue_writing: false
    #    cmd_options:  "-d -z -config report.template=sarif-json"
    #    target: 'http://127.0.0.1:3001'

    - name: zap automation framework
      uses: zaproxy/action-af@v0.2.0
      with:
        plan: plan.yaml
        

    #- name: Upload ZAP Scan SARIF Report
    #  uses: github/codeql-action/upload-sarif@v4
    #  continue-on-error: true
    #  with:
    #    sarif_file: output.sarif.json

    - name: Run SOOS DAST Analysis + Find and rename SARIF file since it is unique
      continue-on-error: true
      run: |
        docker pull soosio/dast:latest
        chmod -R 777 ${{ github.workspace }}
        docker run --net=host -u zap -v ${{ github.workspace }}:/zap/wrk/:rw --rm \
          soosio/dast:latest \
          --integrationName=Github \
          --integrationType=Plugin \
          --appVersion="latest" \
          --apiKey=${{ secrets.SOOS_API_KEY }} \
          --apiURL=https://api.soos.io/api/ \
          --branchName=${{ github.head_ref || github.ref_name }} \
          --branchURI='${{ github.server_url }}/${{ github.repository }}/tree/${{ github.head_ref || github.ref_name }}' \
          --buildURI='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
          --clientId=${{ secrets.SOOS_CLIENT_ID }} \
          --exportFormat="Sarif" \
          --exportFileType="Json" \
          --logLevel=INFO \
          --onFailure=continue_on_failure \
          --operatingEnvironment=${{ runner.os }} \
          --projectName="test run" \
          --scanMode=baseline \
          http://127.0.0.1:3001

        file=$(find . -name "*.sarif.json" | head -n 1)
        if [ -n "$file" ]; then
          mv "$file" output.sarif.json
          echo "Renamed $file to output.sarif.json"
        else
          echo "No SARIF file found" && exit 1
        fi

    - name: Upload SOOS DAST SARIF Report
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: output.sarif.json

    - name: kill server
      continue-on-error: true
      run: |
        kill $(ps aux | grep "php artisan serve --port=3001" | grep -v grep | awk '{print $2}') # Cleanup